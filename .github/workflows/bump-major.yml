name: Bump major

on:
  workflow_call:
    inputs:
      default_branch:
        description: Branch to push the major bump and tags to
        type: string
        required: false
        default: main
      node_version:
        description: Node.js version for setup-node
        type: string
        required: false
        default: "24"
      working_directory:
        description: Directory containing package.json (use . for repo root)
        type: string
        required: false
        default: "."

permissions:
  contents: write

concurrency:
  group: bump-major-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ (inputs.working_directory || '.') == '.' && 'package-lock.json' || format('{0}/package-lock.json', inputs.working_directory || '.') }}

      - name: Configure git author
        uses: MaxiGarcia13/gh-actions/.github/actions/configure-git-author@main

      - name: Install dependencies
        run: npm ci

      - name: Bump major version, commit, and tag
        run: |
          set -euo pipefail
          npm version major -m "chore(release): v%s"

      - name: Read release tag
        id: release_tag
        uses: MaxiGarcia13/gh-actions/.github/actions/read-release-tag@main
        with:
          working_directory: ${{ inputs.working_directory || '.' }}

      - name: Push commit and tags
        working-directory: ${{ github.workspace }}
        run: |
          git push origin "HEAD:${{ inputs.default_branch }}" --follow-tags

  release-notes:
    needs: bump
    uses: ./.github/workflows/create-release-notes.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
      default_branch: ${{ inputs.default_branch }}
