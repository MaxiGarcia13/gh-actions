name: Create release notes

on:
  workflow_call:
    inputs:
      tag:
        description: Git tag for the release (for example v1.2.3)
        type: string
        required: true
      default_branch:
        description: Branch that received the release (sync refs before creating the GitHub Release)
        type: string
        required: false
        default: main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure release tag is available
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${{ inputs.tag }}:refs/tags/${{ inputs.tag }}" 2>/dev/null || git fetch origin --tags --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release $TAG" \
            --generate-notes \
            --verify-tag
