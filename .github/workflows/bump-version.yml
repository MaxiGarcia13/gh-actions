name: Bump version

on:
  workflow_call:
    inputs:
      default_branch:
        description: Branch to push the version bump and tags to
        type: string
        required: false
        default: main
      node_version:
        description: Node.js version for setup-node
        type: string
        required: false
        default: "20"
      working_directory:
        description: Directory containing package.json (use . for repo root)
        type: string
        required: false
        default: "."

permissions:
  contents: write

concurrency:
  group: bump-version-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version || '20' }}
          cache: npm
          cache-dependency-path: ${{ (inputs.working_directory || '.') == '.' && 'package-lock.json' || format('{0}/package-lock.json', inputs.working_directory || '.') }}

      - name: Decide bump (minor if any feat:, else patch)
        id: bump
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          last_tag=""
          if git describe --tags --match "v*" --abbrev=0 >/dev/null 2>&1; then
            last_tag="$(git describe --tags --match "v*" --abbrev=0)"
          fi

          if [[ -n "$last_tag" ]]; then
            range="${last_tag}..HEAD"
          else
            range="HEAD"
          fi

          subjects="$(git log "$range" --format=%s || true)"

          bump="minor"
          if echo "$subjects" | grep -Eq '^(fix)(\(.+\))?!?:'; then
            bump="patch"
          fi

          echo "last_tag=$last_tag" >> "$GITHUB_OUTPUT"
          echo "range=$range" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Configure git author
        uses: MaxiGarcia13/gh-actions/.github/actions/configure-git-author

      - name: Install dependencies
        run: npm ci

      - name: Bump version, commit, and tag
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail
          npm version "$BUMP" -m "chore(release): v%s"

      - name: Push commit and tags
        working-directory: ${{ github.workspace }}
        run: |
          git push origin "HEAD:${{ inputs.default_branch || 'main' }}" --follow-tags
