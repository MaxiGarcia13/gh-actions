name: Deploy to Vercel

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version for setup-node
        type: string
        required: false
        default: "24"
      working_directory:
        description: Directory containing package.json (use . for repo root)
        type: string
        required: false
        default: "."
      deployment_environment:
        description: GitHub Environment name (shown under repo Deployments / Environments)
        type: string
        required: false
        default: production
      deployment_url:
        description: Optional URL for this deployment (shown as the environment link on GitHub)
        type: string
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deployment_url != '' && fromJSON(format('{{"name":{0},"url":{1}}}', toJSON(inputs.deployment_environment), toJSON(inputs.deployment_url))) || fromJSON(format('{{"name":{0}}}', toJSON(inputs.deployment_environment))) }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        run: npm install

      - run: npm install -g vercel

      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
